quarkus.http.port=8082

quarkus.index-dependency.ruleset-contracts.group-id=br.com.cvc.poc
quarkus.index-dependency.ruleset-contracts.artifact-id=ruleset-contracts

engine.chunkSize=128
engine.parallelism=8
engine.useVirtualThreads=false
engine.audit.trace.enabled=true
engine.index.fields=Broker,Cidade,Estado,hotelId

mp.messaging.incoming.ruleset_updates.connector=smallrye-kafka
mp.messaging.incoming.ruleset_updates.topic=ruleset_updates
mp.messaging.incoming.ruleset_updates.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ruleset_updates.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ruleset_updates.auto.offset.reset=earliest

kafka.bootstrap.servers=localhost:9092
